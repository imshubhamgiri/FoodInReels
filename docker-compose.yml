version: "3.9"

services:
  backend:
    build: ./backend
    container_name: FoodInReels-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
    networks:
      - fullstack-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:5000/api
    container_name: FoodInReels-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - fullstack-net
    restart: unless-stopped


  redis:
    image: redis:7-alpine
    container_name: FoodInReels-redis
    ports:
      - "6379:6379"
    networks:
      - fullstack-net
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  redis_data:

networks:
  fullstack-net:
    driver: bridge
