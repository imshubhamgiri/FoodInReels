name: Node.js CI (Backend Tests)

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-backend:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # 1. Setup Bun instead of standard Node/NPM
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    # 2. Clean install dependencies matching your Bun lockfile
    - name: Install dependencies
      run: bun install --frozen-lockfile
      working-directory: backend

    # 3. Run your backend test suite cleanly via Bun
    - name: Run Tests
      run: bun run test
      working-directory: backend
      env:
        TEST_MONGODB_URI: mongodb://localhost:27017/testdb
        IMAGEKIT_PUBLIC_KEY: mock_public_key
        IMAGEKIT_PRIVATE_KEY: mock_private_key
        IMAGEKIT_URL_ENDPOINT: https://ik.imagekit.io/mock
        JWT_SECRET: super_secret_mock_key_for_testing
        REDIS_URL: redis://localhost:6379