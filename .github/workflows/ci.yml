name: Node.js CI (Backend Tests)

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-backend:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x] # Tests across multiple Node versions

    services:
      # Spin up a real, temporary MongoDB instance for your integration tests
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json

    - name: Install dependencies
      run: npm ci
      working-directory: backend

    - name: Run Tests
      run: npm test
      working-directory: backend
      env:
        # Passes the local MongoDB service URI to your test environment
        env:
        TEST_MONGODB_URI: mongodb://localhost:27017/testdb
        IMAGEKIT_PUBLIC_KEY: mock_public_key
        IMAGEKIT_PRIVATE_KEY: mock_private_key
        IMAGEKIT_URL_ENDPOINT: https://ik.imagekit.io/mock
        JWT_SECRET: super_secret_mock_key_for_testing
        REDIS_URL: redis://localhost:6379